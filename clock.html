<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .clock-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .timezone-location {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 20px;
        }

        .digital-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .date-display {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 15px;
        }

        .am-pm {
            font-size: 1rem;
            color: #764ba2;
            font-weight: bold;
        }

        .analog-clock {
            width: 120px;
            height: 120px;
            border: 3px solid #667eea;
            border-radius: 50%;
            position: relative;
            margin: 20px auto;
            background: #f9f9f9;
        }

        .clock-center {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #333;
            border-radius: 10px;
        }

        .hour-hand {
            width: 4px;
            height: 30px;
            background: #764ba2;
            margin-left: -2px;
        }

        .minute-hand {
            width: 3px;
            height: 40px;
            background: #667eea;
            margin-left: -1.5px;
        }

        .second-hand {
            width: 2px;
            height: 45px;
            background: #ff6b6b;
            margin-left: -1px;
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            color: #667eea;
        }

        .number span {
            display: inline-block;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .num-12 { top: 5px; }
        .num-3 { right: 5px; top: 50%; transform: translate(0, -50%); }
        .num-6 { bottom: 5px; }
        .num-9 { left: 5px; top: 50%; transform: translate(0, -50%); }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .digital-time {
                font-size: 2rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ Multi-Timezone Digital Clock</h1>
            <p>Real-time display across major cities worldwide</p>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="controls">
            <button class="btn" onclick="toggleAnalogClocks()">Toggle Analog Clocks</button>
            <button class="btn" onclick="toggle24HourFormat()">Toggle 24-Hour Format</button>
        </div>
    </div>

    <script>
        const timezones = [
            { name: 'New York', timezone: 'America/New_York', location: 'USA' },
            { name: 'Los Angeles', timezone: 'America/Los_Angeles', location: 'USA' },
            { name: 'London', timezone: 'Europe/London', location: 'UK' },
            { name: 'Paris', timezone: 'Europe/Paris', location: 'France' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo', location: 'Japan' },
            { name: 'Sydney', timezone: 'Australia/Sydney', location: 'Australia' },
            { name: 'Dubai', timezone: 'Asia/Dubai', location: 'UAE' },
            { name: 'Singapore', timezone: 'Asia/Singapore', location: 'Singapore' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong', location: 'Hong Kong' },
            { name: 'Mumbai', timezone: 'Asia/Kolkata', location: 'India' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok', location: 'Thailand' },
            { name: 'Mexico City', timezone: 'America/Mexico_City', location: 'Mexico' }
        ];

        let showAnalogClocks = true;
        let use24HourFormat = false;

        function initializeClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            timezones.forEach((tz, index) => {
                const clockCard = document.createElement('div');
                clockCard.className = 'clock-card';
                clockCard.innerHTML = `
                    <div class="timezone-name">${tz.name}</div>
                    <div class="timezone-location">${tz.location}</div>
                    <div class="digital-time" data-timezone="${tz.timezone}" data-index="${index}">00:00:00</div>
                    <div class="date-display" data-timezone="${tz.timezone}">Loading...</div>
                    <div class="am-pm" data-timezone="${tz.timezone}"></div>
                    ${showAnalogClocks ? `
                        <div class="analog-clock" data-timezone="${tz.timezone}">
                            <div class="number">
                                <span class="num-12">12</span>
                                <span class="num-3">3</span>
                                <span class="num-6">6</span>
                                <span class="num-9">9</span>
                            </div>
                            <div class="hand hour-hand"></div>
                            <div class="hand minute-hand"></div>
                            <div class="hand second-hand"></div>
                            <div class="clock-center"></div>
                        </div>
                    ` : ''}
                `;
                grid.appendChild(clockCard);
            });

            updateAllClocks();
            setInterval(updateAllClocks, 1000);
        }

        function updateAllClocks() {
            timezones.forEach(tz => {
                updateClock(tz.timezone);
            });
        }

        function updateClock(timezone) {
            const date = new Date().toLocaleString('en-US', { timeZone: timezone });
            const dateObj = new Date(date);

            // Update digital time
            const timeElement = document.querySelector(`[data-timezone="${timezone}"]`);
            if (timeElement && timeElement.classList.contains('digital-time')) {
                const hours = String(dateObj.getHours()).padStart(2, '0');
                const minutes = String(dateObj.getMinutes()).padStart(2, '0');
                const seconds = String(dateObj.getSeconds()).padStart(2, '0');

                if (use24HourFormat) {
                    timeElement.textContent = `${hours}:${minutes}:${seconds}`;
                } else {
                    let displayHours = dateObj.getHours() % 12 || 12;
                    timeElement.textContent = `${String(displayHours).padStart(2, '0')}:${minutes}:${seconds}`;
                }
            }

            // Update date
            const dateElement = document.querySelector(`.date-display[data-timezone="${timezone}"]`);
            if (dateElement) {
                const options = { weekday: 'short', month: 'short', day: 'numeric' };
                dateElement.textContent = dateObj.toLocaleDateString('en-US', options);
            }

            // Update AM/PM
            const ampmElement = document.querySelector(`.am-pm[data-timezone="${timezone}"]`);
            if (ampmElement) {
                ampmElement.textContent = dateObj.getHours() >= 12 ? 'PM' : 'AM';
            }

            // Update analog clock
            const analogClock = document.querySelector(`.analog-clock[data-timezone="${timezone}"]`);
            if (analogClock) {
                const hours = dateObj.getHours();
                const minutes = dateObj.getMinutes();
                const seconds = dateObj.getSeconds();

                const hourHand = analogClock.querySelector('.hour-hand');
                const minuteHand = analogClock.querySelector('.minute-hand');
                const secondHand = analogClock.querySelector('.second-hand');

                const secondDegrees = (seconds / 60) * 360;
                const minuteDegrees = (minutes / 60) * 360 + (seconds / 60) * 6;
                const hourDegrees = (hours % 12 / 12) * 360 + (minutes / 60) * 30;

                hourHand.style.transform = `rotate(${hourDegrees}deg)`;
                minuteHand.style.transform = `rotate(${minuteDegrees}deg)`;
                secondHand.style.transform = `rotate(${secondDegrees}deg)`;
            }
        }

        function toggleAnalogClocks() {
            showAnalogClocks = !showAnalogClocks;
            initializeClocks();
        }

        function toggle24HourFormat() {
            use24HourFormat = !use24HourFormat;
            updateAllClocks();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeClocks);
    </script>
</body>
</html>
